<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation Hub - 导航中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --primary-light: #dbeafe;
      --bg-light: #f8fafc;
      --bg-dark: #0f172a;
      --card-light: #ffffff;
      --card-dark: #1e293b;
      --text-light: #1e293b;
      --text-dark: #f1f5f9;
      --border-light: #e2e8f0;
      --border-dark: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-light);
      color: var(--text-light);
      transition: background 0.3s, color 0.3s;
    }

    body.dark-mode {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    /* Header */
    header {
      background: var(--card-light);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: all 0.3s;
    }

    body.dark-mode header {
      background: var(--card-dark);
      border-bottom-color: var(--border-dark);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--bg-light);
      color: var(--text-light);
      font-size: 14px;
      transition: all 0.3s;
    }

    body.dark-mode .search-box input {
      background: var(--card-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      opacity: 0.5;
    }

    body.dark-mode .search-icon {
      color: var(--text-dark);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .btn-secondary {
      background: var(--bg-light);
      color: var(--text-light);
      border: 1px solid var(--border-light);
    }

    body.dark-mode .btn-secondary {
      background: var(--card-dark);
      color: var(--text-dark);
      border-color: var(--border-dark);
    }

    .btn-secondary:hover {
      background: var(--border-light);
    }

    body.dark-mode .btn-secondary:hover {
      background: var(--border-dark);
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 1px solid var(--border-light);
      background: var(--bg-light);
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s;
    }

    body.dark-mode .theme-toggle {
      background: var(--card-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .theme-toggle:hover {
      background: var(--border-light);
    }

    body.dark-mode .theme-toggle:hover {
      background: var(--border-dark);
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero h1 {
      font-size: clamp(32px, 8vw, 56px);
      line-height: 1.2;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .hero p {
      font-size: 18px;
      color: var(--text-light);
      opacity: 0.7;
      max-width: 600px;
      margin: 0 auto 32px;
    }

    body.dark-mode .hero p {
      color: var(--text-dark);
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      padding: 10px 18px;
      border: 2px solid var(--border-light);
      background: transparent;
      color: var(--text-light);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    body.dark-mode .category-btn {
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .category-btn:hover,
    .category-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Navigation Grid */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .nav-card {
      background: var(--card-light);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    body.dark-mode .nav-card {
      background: var(--card-dark);
      border-color: var(--border-dark);
    }

    .nav-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }

    .nav-card:hover::before {
      transform: scaleX(1);
    }

    .nav-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    body.dark-mode .nav-card:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }

    .nav-card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .nav-icon {
      font-size: 32px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
      border-radius: 8px;
    }

    body.dark-mode .nav-icon {
      background: rgba(59, 130, 246, 0.2);
    }

    .nav-favorite {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
      border-radius: 6px;
    }

    body.dark-mode .nav-favorite {
      color: var(--text-dark);
    }

    .nav-favorite:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    body.dark-mode .nav-favorite:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    .nav-favorite.favorited {
      color: var(--primary);
    }

    .nav-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-light);
    }

    body.dark-mode .nav-title {
      color: var(--text-dark);
    }

    .nav-desc {
      font-size: 13px;
      color: var(--text-light);
      opacity: 0.6;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    body.dark-mode .nav-desc {
      color: var(--text-dark);
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .nav-link:hover {
      gap: 10px;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      opacity: 0.6;
    }

    body.dark-mode .empty-state {
      color: var(--text-dark);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Footer */
    footer {
      background: var(--card-light);
      border-top: 1px solid var(--border-light);
      padding: 40px 20px;
      text-align: center;
      color: var(--text-light);
      opacity: 0.6;
    }

    body.dark-mode footer {
      background: var(--card-dark);
      border-top-color: var(--border-dark);
      color: var(--text-dark);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 12px;
      }

      .search-box {
        max-width: 100%;
      }

      .hero {
        margin-bottom: 40px;
      }

      .nav-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }

      .categories {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 8px;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-card {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container">
      <a href="/" class="logo">
        <span>🧭</span>
        <span>Navigation Hub</span>
      </a>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="6" cy="6" r="5"></circle>
          <path d="m11 11 4 4"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索导航链接..." />
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="favoritesBtn">
          <span>❤️</span>
          <span>收藏</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Hero Section -->
    <section class="hero">
      <h1>欢迎来到导航中心</h1>
      <p>精心收集的优质网站和工具，帮助你快速找到需要的资源</p>
    </section>

    <!-- Categories -->
    <div class="categories" id="categories"></div>

    <!-- Navigation Grid -->
    <div class="nav-grid" id="navGrid"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">🔍</div>
      <p>没有找到匹配的导航链接</p>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Navigation Hub. 精心打造的导航中心</p>
    <p>作者：<strong>小秋</strong> | 工作室：<strong>星渊</strong></p>
  </footer>

  <!-- Admin Button -->
  <button id="adminBtn" style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); transition: all 0.3s; display: flex; align-items: center; justify-content: center; z-index: 99;" title="管理导航">⚙️</button>

  <!-- Admin Modal -->
  <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background: var(--card-light); border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">导航管理后台</h2>
        <button id="closeAdminModal" style="background: none; border: none; font-size: 24px; cursor: pointer;">✕</button>
      </div>
      
      <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-light); padding-bottom: 10px;">
        <button class="admin-tab active" data-tab="list" style="background: none; border: none; padding: 10px 15px; cursor: pointer; font-weight: 600; color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -12px;">导航列表</button>
        <button class="admin-tab" data-tab="add" style="background: none; border: none; padding: 10px 15px; cursor: pointer; font-weight: 600; color: #999;">添加导航</button>
      </div>

      <div id="listTab" class="admin-tab-content" style="max-height: 400px; overflow-y: auto;"></div>
      <div id="addTab" class="admin-tab-content" style="display: none;">
        <form id="addNavForm" style="display: flex; flex-direction: column; gap: 15px;">
          <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">标题</label>
            <input type="text" id="navTitle" required style="width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 6px;">
          </div>
          <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">描述</label>
            <textarea id="navDesc" required style="width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 6px; min-height: 80px;"></textarea>
          </div>
          <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">URL</label>
            <input type="url" id="navUrl" required style="width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 6px;">
          </div>
          <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">分类</label>
            <select id="navCategory" required style="width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 6px;">
              <option value="">选择分类</option>
              <option value="开发工具">开发工具</option>
              <option value="设计工具">设计工具</option>
              <option value="AI工具">AI工具</option>
              <option value="学习平台">学习平台</option>
              <option value="生产力">生产力</option>
              <option value="社交媒体">社交媒体</option>
            </select>
          </div>
          <div>
            <label style="display: block; margin-bottom: 5px; font-weight: 600;">图标 (emoji)</label>
            <input type="text" id="navIcon" value="🔗" maxlength="2" style="width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 6px;">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">添加导航</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Navigation Data
    const navigationData = [
      {
        id: 1,
        category: "开发工具",
        title: "GitHub",
        description: "全球最大的代码托管平台",
        icon: "💻",
        url: "https://github.com",
        tags: ["代码", "开源", "协作"]
      },
      {
        id: 2,
        category: "开发工具",
        title: "Stack Overflow",
        description: "程序员的问答社区",
        icon: "❓",
        url: "https://stackoverflow.com",
        tags: ["问答", "编程", "学习"]
      },
      {
        id: 3,
        category: "开发工具",
        title: "MDN Web Docs",
        description: "Web 开发者资源库",
        icon: "📚",
        url: "https://developer.mozilla.org",
        tags: ["文档", "学习", "参考"]
      },
      {
        id: 4,
        category: "设计工具",
        title: "Figma",
        description: "现代化的设计协作工具",
        icon: "🎨",
        url: "https://figma.com",
        tags: ["设计", "协作", "原型"]
      },
      {
        id: 5,
        category: "设计工具",
        title: "Adobe Creative Cloud",
        description: "专业的创意设计套件",
        icon: "🖼️",
        url: "https://adobe.com",
        tags: ["设计", "视频", "图片"]
      },
      {
        id: 6,
        category: "AI工具",
        title: "ChatGPT",
        description: "先进的 AI 对话助手",
        icon: "🤖",
        url: "https://chatgpt.com",
        tags: ["AI", "对话", "写作"]
      },
      {
        id: 7,
        category: "AI工具",
        title: "Midjourney",
        description: "AI 图像生成工具",
        icon: "🎭",
        url: "https://midjourney.com",
        tags: ["AI", "图像", "创意"]
      },
      {
        id: 8,
        category: "学习平台",
        title: "Coursera",
        description: "全球在线学习平台",
        icon: "🎓",
        url: "https://coursera.org",
        tags: ["学习", "课程", "证书"]
      },
      {
        id: 9,
        category: "学习平台",
        title: "Udemy",
        description: "在线课程市场",
        icon: "📖",
        url: "https://udemy.com",
        tags: ["学习", "课程", "技能"]
      },
      {
        id: 10,
        category: "生产力",
        title: "Notion",
        description: "一体化工作空间",
        icon: "📝",
        url: "https://notion.so",
        tags: ["笔记", "任务", "协作"]
      },
      {
        id: 11,
        category: "生产力",
        title: "Trello",
        description: "看板式项目管理工具",
        icon: "📋",
        url: "https://trello.com",
        tags: ["项目管理", "协作", "任务"]
      },
      {
        id: 12,
        category: "社交媒体",
        title: "Twitter",
        description: "实时信息分享平台",
        icon: "🐦",
        url: "https://twitter.com",
        tags: ["社交", "新闻", "讨论"]
      }
    ];

    // State
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentCategory = 'all';
    let searchQuery = '';

    // DOM Elements
    const categoriesContainer = document.getElementById('categories');
    const navGrid = document.getElementById('navGrid');
    const searchInput = document.getElementById('searchInput');
    const themeToggle = document.getElementById('themeToggle');
    const favoritesBtn = document.getElementById('favoritesBtn');
    const emptyState = document.getElementById('emptyState');

    // Initialize
    function init() {
      renderCategories();
      renderNavigation();
      setupEventListeners();
      loadTheme();
    }

    // Render Categories
    function renderCategories() {
      const categories = ['all', ...new Set(navigationData.map(item => item.category))];
      categoriesContainer.innerHTML = categories.map(cat => `
        <button class="category-btn ${cat === 'all' ? 'active' : ''}" data-category="${cat}">
          ${cat === 'all' ? '全部' : cat}
        </button>
      `).join('');

      categoriesContainer.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          categoriesContainer.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentCategory = e.target.dataset.category;
          renderNavigation();
        });
      });
    }

    // Render Navigation
    function renderNavigation() {
      let filtered = navigationData;

      if (currentCategory !== 'all') {
        filtered = filtered.filter(item => item.category === currentCategory);
      }

      if (searchQuery) {
        filtered = filtered.filter(item =>
          item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()))
        );
      }

      if (filtered.length === 0) {
        navGrid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      navGrid.innerHTML = filtered.map(item => `
        <div class="nav-card">
          <div class="nav-card-header">
            <div class="nav-icon">${item.icon}</div>
            <button class="nav-favorite ${favorites.includes(item.id) ? 'favorited' : ''}" data-id="${item.id}" title="添加到收藏">
              ${favorites.includes(item.id) ? '❤️' : '🤍'}
            </button>
          </div>
          <h3 class="nav-title">${item.title}</h3>
          <p class="nav-desc">${item.description}</p>
          <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="nav-link">
            访问网站 →
          </a>
        </div>
      `).join('');

      navGrid.querySelectorAll('.nav-favorite').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          toggleFavorite(id, btn);
        });
      });
    }

    // Toggle Favorite
    function toggleFavorite(id, btn) {
      const index = favorites.indexOf(id);
      if (index > -1) {
        favorites.splice(index, 1);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      btn.classList.toggle('favorited');
      btn.textContent = favorites.includes(id) ? '❤️' : '🤍';
    }

    // Setup Event Listeners
    function setupEventListeners() {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderNavigation();
      });

      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        updateThemeToggle();
      });

      favoritesBtn.addEventListener('click', () => {
        const isFavoritesMode = currentCategory === 'favorites';
        if (isFavoritesMode) {
          currentCategory = 'all';
          document.querySelectorAll('.category-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.category === 'all');
          });
        } else {
          currentCategory = 'favorites';
          document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        }
        renderNavigation();
      });
    }

    // Load Theme
    function loadTheme() {
      const theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-mode');
      }
      updateThemeToggle();
    }

    // Update Theme Toggle
    function updateThemeToggle() {
      themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }

    // Override renderNavigation for favorites
    const originalRenderNavigation = renderNavigation;
    renderNavigation = function() {
      let filtered = navigationData;

      if (currentCategory === 'favorites') {
        filtered = navigationData.filter(item => favorites.includes(item.id));
      } else if (currentCategory !== 'all') {
        filtered = filtered.filter(item => item.category === currentCategory);
      }

      if (searchQuery) {
        filtered = filtered.filter(item =>
          item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()))
        );
      }

      if (filtered.length === 0) {
        navGrid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      navGrid.innerHTML = filtered.map(item => `
        <div class="nav-card">
          <div class="nav-card-header">
            <div class="nav-icon">${item.icon}</div>
            <button class="nav-favorite ${favorites.includes(item.id) ? 'favorited' : ''}" data-id="${item.id}" title="添加到收藏">
              ${favorites.includes(item.id) ? '❤️' : '🤍'}
            </button>
          </div>
          <h3 class="nav-title">${item.title}</h3>
          <p class="nav-desc">${item.description}</p>
          <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="nav-link">
            访问网站 →
          </a>
        </div>
      `).join('');

      navGrid.querySelectorAll('.nav-favorite').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          toggleFavorite(id, btn);
        });
      });
    };

    // Admin Modal Functions
    const adminBtn = document.getElementById('adminBtn');
    const adminModal = document.getElementById('adminModal');
    const closeAdminModal = document.getElementById('closeAdminModal');
    const adminTabs = document.querySelectorAll('.admin-tab');
    const addNavForm = document.getElementById('addNavForm');

    adminBtn.addEventListener('click', () => {
      adminModal.style.display = 'flex';
      renderNavList();
    });

    closeAdminModal.addEventListener('click', () => {
      adminModal.style.display = 'none';
    });

    adminModal.addEventListener('click', (e) => {
      if (e.target === adminModal) {
        adminModal.style.display = 'none';
      }
    });

    adminTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        adminTabs.forEach(t => {
          t.classList.remove('active');
          t.style.color = '#999';
          t.style.borderBottom = 'none';
          t.style.marginBottom = '0';
        });
        tab.classList.add('active');
        tab.style.color = 'var(--primary)';
        tab.style.borderBottom = '2px solid var(--primary)';
        tab.style.marginBottom = '-12px';
        
        const tabName = tab.dataset.tab;
        document.getElementById('listTab').style.display = tabName === 'list' ? 'block' : 'none';
        document.getElementById('addTab').style.display = tabName === 'add' ? 'block' : 'none';
        
        if (tabName === 'list') {
          renderNavList();
        }
      });
    });

    function renderNavList() {
      const listTab = document.getElementById('listTab');
      listTab.innerHTML = navigationData.map(item => `
        <div style="padding: 15px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
          <div>
            <div style="font-weight: 600; margin-bottom: 5px;">${item.icon} ${item.title}</div>
            <div style="font-size: 0.9rem; color: #999;">${item.category} - ${item.description}</div>
          </div>
          <button onclick="deleteNavigation(${item.id})" style="background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem;">删除</button>
        </div>
      `).join('');
    }

    window.deleteNavigation = function(id) {
      if (confirm('确定要删除这个导航吗？')) {
        navigationData = navigationData.filter(item => item.id !== id);
        renderNavList();
        renderNavigation();
      }
    };

    addNavForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('navTitle').value;
      const desc = document.getElementById('navDesc').value;
      const url = document.getElementById('navUrl').value;
      const category = document.getElementById('navCategory').value;
      const icon = document.getElementById('navIcon').value || '🔗';

      const newNav = {
        id: Math.max(...navigationData.map(n => n.id), 0) + 1,
        category,
        title,
        description: desc,
        icon,
        url,
        tags: [category]
      };

      navigationData.push(newNav);
      addNavForm.reset();
      renderNavList();
      alert('导航添加成功！');
    });

    // Start
    init();
  </script>
</body>
</html>
