<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation Hub - 导航中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --primary-light: #dbeafe;
      --bg-light: #f8fafc;
      --bg-dark: #0f172a;
      --card-light: #ffffff;
      --card-dark: #1e293b;
      --text-light: #1e293b;
      --text-dark: #f1f5f9;
      --border-light: #e2e8f0;
      --border-dark: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg-light);
      color: var(--text-light);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body.dark-mode {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    /* Header */
    header {
      background: var(--card-light);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: all 0.3s;
    }

    body.dark-mode header {
      background: var(--card-dark);
      border-bottom-color: var(--border-dark);
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      background: var(--bg-light);
      color: var(--text-light);
      font-size: 14px;
      transition: all 0.3s;
    }

    body.dark-mode .search-box input {
      background: var(--card-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border-light);
      background: var(--card-light);
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s;
    }

    body.dark-mode .theme-toggle {
      background: var(--card-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .theme-toggle:hover {
      background: var(--border-light);
      transform: rotate(15deg);
    }

    body.dark-mode .theme-toggle:hover {
      background: var(--border-dark);
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      flex: 1;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .hero h1 {
      font-size: clamp(32px, 8vw, 56px);
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.7;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .category-btn {
      padding: 8px 20px;
      border: 1px solid var(--border-light);
      background: var(--card-light);
      color: var(--text-light);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    body.dark-mode .category-btn {
      background: var(--card-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .category-btn.active, .category-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* Nav Grid */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .nav-card {
      background: var(--card-light);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    body.dark-mode .nav-card {
      background: var(--card-dark);
      border-color: var(--border-dark);
    }

    .nav-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      border-color: var(--primary);
    }

    .nav-icon {
      font-size: 32px;
      margin-bottom: 16px;
      width: 56px;
      height: 56px;
      background: var(--bg-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    body.dark-mode .nav-icon {
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-card:hover .nav-icon {
      background: var(--primary-light);
      transform: scale(1.1);
    }

    .nav-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .nav-desc {
      font-size: 14px;
      opacity: 0.6;
      line-height: 1.6;
      margin-bottom: 16px;
      flex: 1;
    }

    .nav-tag {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--bg-light);
      border-radius: 6px;
      color: var(--primary);
      font-weight: 600;
      align-self: flex-start;
    }

    body.dark-mode .nav-tag {
      background: rgba(59, 130, 246, 0.1);
    }

    /* Footer */
    footer {
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid var(--border-light);
      opacity: 0.6;
      font-size: 14px;
    }

    body.dark-mode footer {
      border-top-color: var(--border-dark);
    }

    @media (max-width: 640px) {
      .header-container { flex-direction: column; gap: 16px; }
      .search-box { max-width: 100%; }
      .hero h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <a href="#" class="logo">
        <span>🚀</span>
        <span>Navigation Hub</span>
      </a>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索资源、工具、灵感..." />
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" title="切换主题">🌓</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>发现更广阔的世界</h1>
      <p>精选全球优质资源，为您的创意与开发提速。由小秋精心维护。</p>
    </section>

    <div class="categories" id="categoryContainer">
      <button class="category-btn active" data-category="all">全部</button>
      <button class="category-btn" data-category="dev">开发者工具</button>
      <button class="category-btn" data-category="design">设计灵感</button>
      <button class="category-btn" data-category="ai">人工智能</button>
      <button class="category-btn" data-category="daily">日常常用</button>
    </div>

    <div class="nav-grid" id="navGrid">
      <!-- 动态加载内容 -->
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Navigation Hub. Created by 小秋 | 星渊工作室</p>
  </footer>

  <script>
    const navData = [
      { title: "GitHub", desc: "全球最大的代码托管平台，开发者必选。", url: "https://github.com", icon: "🐙", category: "dev" },
      { title: "ChatGPT", desc: "领先的 AI 对话模型，辅助编程与创意。", url: "https://chatgpt.com", icon: "🤖", category: "ai" },
      { title: "Dribbble", desc: "发现全球顶尖设计师的创意作品。", url: "https://dribbble.com", icon: "🎨", category: "design" },
      { title: "V2EX", desc: "创意工作者们的社区，分享发现与思考。", url: "https://v2ex.com", icon: "💬", category: "daily" },
      { title: "Stack Overflow", desc: "解决编程问题的首选问答社区。", url: "https://stackoverflow.com", icon: "📚", category: "dev" },
      { title: "Notion", desc: "全能笔记与团队协作工具。", url: "https://notion.so", icon: "📝", category: "daily" },
      { title: "Midjourney", desc: "强大的 AI 图像生成工具。", url: "https://midjourney.com", icon: "🖼️", category: "ai" },
      { title: "Figma", desc: "最受欢迎的协作式设计工具。", url: "https://figma.com", icon: "📐", category: "design" }
    ];

    const navGrid = document.getElementById('navGrid');
    const searchInput = document.getElementById('searchInput');
    const themeToggle = document.getElementById('themeToggle');
    const categoryBtns = document.querySelectorAll('.category-btn');

    function renderCards(filter = '', category = 'all') {
      navGrid.innerHTML = '';
      const filtered = navData.filter(item => {
        const matchesSearch = item.title.toLowerCase().includes(filter.toLowerCase()) || 
                             item.desc.toLowerCase().includes(filter.toLowerCase());
        const matchesCategory = category === 'all' || item.category === category;
        return matchesSearch && matchesCategory;
      });

      if (filtered.length === 0) {
        navGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; opacity: 0.5;">未找到相关资源</div>';
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('a');
        card.href = item.url;
        card.target = "_blank";
        card.className = 'nav-card';
        card.innerHTML = `
          <div class="nav-icon">${item.icon}</div>
          <div class="nav-title">${item.title}</div>
          <div class="nav-desc">${item.desc}</div>
          <div class="nav-tag">${item.category.toUpperCase()}</div>
        `;
        navGrid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (e) => {
      const activeCat = document.querySelector('.category-btn.active').dataset.category;
      renderCards(e.target.value, activeCat);
    });

    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCards(searchInput.value, btn.dataset.category);
      });
    });

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    renderCards();
  </script>
</body>
</html>
